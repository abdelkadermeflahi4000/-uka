# 🧠 إعدادات مشروع Đuka
project:
  name: "Đuka Protocol"
  version: "0.1.0"
  description: "Distributed Unified Knowledge Architecture"

environment:
  type: "GridWorld"  # أو "CartPole" للبداية الأسرع
  grid_size: 10
  max_steps: 100
  render: true

agent:
  algorithm: "PPO"
  policy: "MlpPolicy"
  learning_rate: 0.0003
  gamma: 0.99
  n_steps: 2048
  batch_size: 64
  n_epochs: 10

training:
  total_timesteps: 50000
  save_freq: 5000
  log_dir: "logs/duka"
  model_dir: "models/duka"

network:
  enabled: true
  node_id: "node_001"
  peers: []  # ["node_002", "node_003"]
  sync_interval: 100  # خطوات للتبادل المعرفي
