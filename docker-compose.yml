# 🚀 Đuka Protocol - Complete Docker Compose Stack
# Includes: App + Monitoring (Prometheus, Grafana, Loki)
# Usage: docker-compose up -d

version: '3.8'

services:
  # ============================================================================
  # Đuka Application (Real-time Pipeline)
  # ============================================================================
  duka_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: duka_app
    volumes:
      - ./models:/app/models
      - ./tensorboard:/app/tensorboard
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - CUDA_VISIBLE_DEVICES=-1
      - ĐUKA_NODE_ID=duka_node_01
    ports:
      - "8000:8000"   # FastAPI metrics
      - "7860:7860"   # Gradio demo
    command: python -m src.realtime_pipeline
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
    networks:
      - duka_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: Gradio Demo Service (comment/uncomment as needed)
  # duka_gradio:
  #   build: .
  #   container_name: duka_gradio
  #   depends_on:
  #     - duka_app
  #   ports:
  #     - "7861:7860"
  #   command: python app.py
  #   networks:
  #     - duka_network

  # ============================================================================
  # Prometheus (Metrics Collection)
  # ============================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: duka_prometheus
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - duka_network
    restart: unless-stopped

  # ============================================================================
  # Grafana (Visualization Dashboards)
  # ============================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: duka_grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=duka2026
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    ports:
      - "3000:3000"
    networks:
      - duka_network
    depends_on:
      - prometheus
    restart: unless-stopped

  # ============================================================================
  # Node Exporter (System Metrics)
  # ============================================================================
  node_exporter:
    image: prom/node-exporter:latest
    container_name: duka_node_exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"
    networks:
      - duka_network
    restart: unless-stopped

  # ============================================================================
  # cAdvisor (Container Metrics)
  # ============================================================================
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: duka_cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8080:8080"
    networks:
      - duka_network
    privileged: true
    restart: unless-stopped

  # ============================================================================
  # Loki (Log Aggregation - Optional)
  # ============================================================================
  loki:
    image: grafana/loki:latest
    container_name: duka_loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - duka_network
    restart: unless-stopped

networks:
  duka_network:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:

